<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFBOTS</title>
    <style>
        :root {
            --glitch-color: #00ff41;
            --bg-color: #0a0a0a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--glitch-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #ui-container {
            text-align: center;
        }

        /* Глитч эффект */
        .glitch {
            font-size: 2rem;
            font-weight: bold;
            position: relative;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                         -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                         0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
            margin-bottom: 30px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #f00, -0.05em -0.025em 0 #0f0, 0.025em 0.05em 0 #00f; }
            15% { text-shadow: -0.05em -0.025em 0 #f00, 0.025em 0.025em 0 #0f0, -0.05em -0.05em 0 #00f; }
            50% { text-shadow: 0.025em 0.05em 0 #f00, 0.05em 0 0 #0f0, 0 -0.05em 0 #00f; }
            100% { text-shadow: -0.025em 0 0 #f00, -0.025em -0.025em 0 #0f0, -0.025em -0.05em 0 #00f; }
        }

        /* Круговой бар */
        .progress-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto;
        }

        svg {
            transform: rotate(-90deg);
        }

        .circle-bg {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 12;
        }

        .circle-progress {
            fill: none;
            stroke: var(--glitch-color);
            stroke-width: 12;
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 0.1s linear;
            stroke-linecap: round;
        }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
        }

        /* Экран "Лоха" */
        .hidden { display: none !important; }
        
        #final-screen {
            text-align: center;
            padding: 20px;
        }

        .scary {
            color: #ff0000;
            font-size: 3.5rem;
            animation: shake 0.1s infinite;
            margin: 0;
        }

        @keyframes shake {
            0% { transform: translate(3px, 1px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(1px, 2px); }
        }

        .sub-text {
            color: #fff;
            margin-top: 20px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="glitch">Processing Data...</div>
        
        <div class="progress-container">
            <svg width="220" height="220">
                <circle class="circle-bg" cx="110" cy="110" r="90"></circle>
                <circle id="progress-bar" class="circle-progress" cx="110" cy="110" r="90"></circle>
            </svg>
            <div class="percentage" id="percent-text">0%</div>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <h1 class="scary">ФИШИНГ УСПЕШЕН!</h1>
        <div class="glitch" style="font-size: 2.5rem; color: #fff; margin-top: 20px;">ТЫ ЛОХ :)</div>
        <p class="sub-text">Твои данные были отправлены. Можешь не обновлять страницу.</p>
    </div>

    <script>
        // Работа с куки
        function setCookie(name, value) {
            const d = new Date();
            d.setTime(d.getTime() + (365*24*60*60*1000));
            document.cookie = name + "=" + value + ";expires="+ d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            let nameEQ = name + "=";
            let ca = document.cookie.split(';');
            for(let i=0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent-text');
        const uiContainer = document.getElementById('ui-container');
        const finalScreen = document.getElementById('final-screen');

        let progress = 0;
        const totalCircumference = 565.48;

        function updateProgress() {
            if (progress < 100) {
                // Случайная скорость для реализма
                progress += Math.random() * 1.5;
                if (progress > 100) progress = 100;
                
                const offset = totalCircumference - (progress / 100) * totalCircumference;
                progressBar.style.strokeDashoffset = offset;
                percentText.innerText = Math.floor(progress) + "%";

                setTimeout(updateProgress, 50 + Math.random() * 150);
            } else {
                setCookie("pwned_user", "1");
                showFinal();
            }
        }

        function showFinal() {
            uiContainer.classList.add('hidden');
            finalScreen.classList.remove('hidden');
            document.body.style.backgroundColor = "black";
        }

        window.onload = function() {
            if (getCookie("pwned_user")) {
                showFinal();
                document.querySelector('.sub-text').innerText = "Я же сказал: ты уже попался. Куки всё помнят!";
            } else {
                setTimeout(updateProgress, 1000);
            }
        };
    </script>
</body>
</html>
